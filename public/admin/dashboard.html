<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Numeracy Books</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --green:      #005a32;
      --green-dark: #003d1f;
      --green-light:#e8f5ee;
      --gold:       #c8a028;
      --text:       #1a2e1a;
      --muted:      #4a5e4a;
      --border:     #d0e4d8;
      --bg:         #f4faf6;
      --white:      #fff;
      --radius:     10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); }

    /* Layout */
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--green-dark); color: #fff;
      display: flex; flex-direction: column; padding: 1.5rem 0;
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
    }
    .sidebar-logo { padding: 0 1.5rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.12); }
    .sidebar-logo h1 { font-size: 0.95rem; line-height: 1.4; }
    .sidebar-logo p  { font-size: 0.75rem; opacity: 0.6; margin-top: 0.2rem; }
    .sidebar-nav { flex: 1; padding: 1rem 0; }
    .sidebar-nav a {
      display: block; padding: 0.65rem 1.5rem;
      color: rgba(255,255,255,0.8); font-size: 0.9rem;
      text-decoration: none; transition: background 0.2s;
    }
    .sidebar-nav a:hover, .sidebar-nav a.active { background: rgba(255,255,255,0.1); color: #fff; }
    .sidebar-footer { padding: 1rem 1.5rem; border-top: 1px solid rgba(255,255,255,0.12); }
    .btn-logout {
      background: none; border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.8);
      padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; width: 100%;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.1); }

    /* Main content */
    .main { flex: 1; padding: 2rem; overflow-x: hidden; }
    .main-header { margin-bottom: 2rem; }
    .main-header h2 { font-size: 1.6rem; color: var(--green-dark); }
    .main-header p  { color: var(--muted); font-size: 0.9rem; margin-top: 0.3rem; }

    /* Stat cards */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1.2rem; margin-bottom: 2rem; }
    .stat-card {
      background: var(--white); border-radius: var(--radius); padding: 1.4rem;
      border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,60,30,0.06);
    }
    .stat-card .label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-card .value { font-size: 2.2rem; font-weight: 700; color: var(--green); margin: 0.3rem 0; }
    .stat-card .sub   { font-size: 0.78rem; color: var(--muted); }

    /* Sections */
    .section { margin-bottom: 2.5rem; }
    .section-title {
      font-size: 1.1rem; color: var(--green-dark); font-weight: 700;
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--green-light);
    }

    /* Chart */
    .chart-wrap { background: var(--white); border-radius: var(--radius); padding: 1.5rem; border: 1px solid var(--border); max-width: 600px; }

    /* Tables */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
    th { background: var(--green-dark); color: #fff; padding: 0.75rem 1rem; text-align: left; font-size: 0.85rem; white-space: nowrap; }
    td { padding: 0.7rem 1rem; font-size: 0.88rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--green-light); }
    .empty-row td { text-align: center; color: var(--muted); padding: 2rem; }

    /* Status badges */
    .badge {
      display: inline-block; padding: 0.25rem 0.7rem; border-radius: 20px;
      font-size: 0.78rem; font-weight: 600; white-space: nowrap;
    }
    .badge-new         { background: #e8f0ff; color: #1a3a8f; }
    .badge-in_progress { background: #fff3cd; color: #856404; }
    .badge-complete    { background: var(--green-light); color: var(--green); }

    /* Status controls */
    .status-select {
      border: 1px solid var(--border); border-radius: 6px; padding: 0.3rem 0.5rem;
      font-size: 0.82rem; cursor: pointer; background: var(--white);
    }
    .notes-input {
      border: 1px solid var(--border); border-radius: 6px; padding: 0.3rem 0.5rem;
      font-size: 0.82rem; width: 100%; min-width: 140px;
    }
    .btn-save {
      background: var(--green); color: #fff; border: none; border-radius: 6px;
      padding: 0.3rem 0.8rem; font-size: 0.82rem; cursor: pointer; white-space: nowrap;
    }
    .btn-save:hover { background: #006e3d; }
    .btn-save.saved { background: #888; }

    /* Loader */
    .loader { text-align: center; padding: 3rem; color: var(--muted); }

    @media (max-width: 700px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: static; }
      .sidebar-nav { display: flex; flex-wrap: wrap; padding: 0.5rem; }
      .sidebar-nav a { padding: 0.5rem 0.8rem; }
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <h1>Numeracy Books</h1>
      <p>Admin Dashboard</p>
    </div>
    <div class="sidebar-nav">
      <a href="#overview"  class="active">&#128200; Overview</a>
      <a href="#errors">&#9888;&#65039; Error Reports</a>
      <a href="#feedback">&#128172; Feedback</a>
      <a href="/" target="_blank">&#127760; View Site</a>
    </div>
    <div class="sidebar-footer">
      <button class="btn-logout" id="logoutBtn">Log Out</button>
    </div>
  </nav>

  <!-- Main -->
  <main class="main" id="mainContent">
    <div class="loader" id="loader">Loading dashboard…</div>
    <div id="dashContent" style="display:none">

      <!-- Overview -->
      <div id="overview">
        <div class="main-header">
          <h2>Overview</h2>
          <p id="lastUpdated"></p>
        </div>

        <div class="stats" id="statsGrid"></div>

        <div class="section">
          <div class="section-title">Page Visits — Last 14 Days</div>
          <div class="chart-wrap">
            <canvas id="visitsChart" height="100"></canvas>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Downloads by Book</div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Book</th><th>Total Downloads</th></tr></thead>
              <tbody id="dlByBookBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Error Reports -->
      <div id="errors" class="section" style="margin-top:2.5rem">
        <div class="section-title">Error Reports</div>
        <div class="table-wrap">
          <table id="errorsTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Book</th>
                <th>Page</th>
                <th>Description</th>
                <th>Email</th>
                <th>Submitted</th>
                <th>Status</th>
                <th>Notes</th>
                <th>Save</th>
              </tr>
            </thead>
            <tbody id="errorsBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Feedback -->
      <div id="feedback" class="section" style="margin-top:2.5rem">
        <div class="section-title">General Feedback</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Message</th>
                <th>Submitted</th>
              </tr>
            </thead>
            <tbody id="feedbackBody"></tbody>
          </table>
        </div>
      </div>

    </div><!-- /dashContent -->
  </main>
</div>

<script>
'use strict';

// ── Auth helpers ──────────────────────────────────────────
function getToken() { return localStorage.getItem('admin_token') || ''; }
function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() }; }

// ── Auth check ────────────────────────────────────────────
(async () => {
  const res  = await fetch('/admin/check', { headers: authHeaders() });
  const json = await res.json();
  if (!json.isAdmin) window.location.href = '/admin/login.html';
})();

// ── Logout ────────────────────────────────────────────────
document.getElementById('logoutBtn').addEventListener('click', async () => {
  localStorage.removeItem('admin_token');
  window.location.href = '/admin/login.html';
});

// ── Helpers ───────────────────────────────────────────────
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-AU', { dateStyle: 'short', timeStyle: 'short' });
}
function badgeHTML(status) {
  const labels = { new: 'New', in_progress: 'In Progress', complete: 'Complete' };
  return `<span class="badge badge-${status}">${labels[status] || status}</span>`;
}

// ── Load data ─────────────────────────────────────────────
async function loadDashboard() {
  const res  = await fetch('/admin/data', { headers: authHeaders() });
  if (res.status === 401) { window.location.href = '/admin/login.html'; return; }
  const d    = await res.json();

  document.getElementById('loader').style.display      = 'none';
  document.getElementById('dashContent').style.display = 'block';
  document.getElementById('lastUpdated').textContent   =
    'Last updated: ' + new Date().toLocaleTimeString('en-AU');

  renderStats(d.stats);
  renderChart(d.visitsByDay);
  renderDlByBook(d.dlByBook);
  renderErrors(d.errors);
  renderFeedback(d.feedback);
}

// ── Stats ─────────────────────────────────────────────────
function renderStats(s) {
  const grid = document.getElementById('statsGrid');
  grid.innerHTML = `
    <div class="stat-card">
      <div class="label">Visits Today</div>
      <div class="value">${s.visitsToday}</div>
      <div class="sub">${s.visitsTotal} all time</div>
    </div>
    <div class="stat-card">
      <div class="label">Downloads Today</div>
      <div class="value">${s.dlToday}</div>
      <div class="sub">${s.dlTotal} all time</div>
    </div>
    <div class="stat-card">
      <div class="label">Pending Errors</div>
      <div class="value" style="color:${s.pendingErrors > 0 ? '#c8a028' : 'var(--green)'}">${s.pendingErrors}</div>
      <div class="sub">Not yet complete</div>
    </div>
    <div class="stat-card">
      <div class="label">Feedback Today</div>
      <div class="value">${s.newFeedback}</div>
      <div class="sub">New submissions</div>
    </div>
  `;
}

// ── Chart ─────────────────────────────────────────────────
function renderChart(visitsByDay) {
  const sorted = [...visitsByDay].reverse();
  new Chart(document.getElementById('visitsChart'), {
    type: 'bar',
    data: {
      labels:   sorted.map(r => r.day),
      datasets: [{ label: 'Visits', data: sorted.map(r => r.n),
                   backgroundColor: '#005a3288', borderColor: '#005a32', borderWidth: 1, borderRadius: 4 }],
    },
    options: {
      responsive: true, plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
    },
  });
}

// ── Downloads by book ─────────────────────────────────────
function renderDlByBook(data) {
  const tbody = document.getElementById('dlByBookBody');
  if (!data.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="2">No downloads recorded yet.</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(r =>
    `<tr><td>${esc(r.book)}</td><td><strong>${r.n}</strong></td></tr>`
  ).join('');
}

// ── Errors ────────────────────────────────────────────────
function renderErrors(errors) {
  const tbody = document.getElementById('errorsBody');
  if (!errors.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="9">No error reports yet.</td></tr>';
    return;
  }
  tbody.innerHTML = errors.map(r => `
    <tr id="err-row-${r.id}">
      <td>${r.id}</td>
      <td>${esc(r.book)}</td>
      <td>${esc(r.page_number) || '—'}</td>
      <td style="max-width:250px;white-space:pre-wrap">${esc(r.description)}</td>
      <td>${esc(r.reporter_email) || '—'}</td>
      <td style="white-space:nowrap">${fmtDate(r.submitted_at)}</td>
      <td>
        <select class="status-select" data-id="${r.id}" onchange="statusChanged(${r.id})">
          <option value="new"         ${r.status==='new'         ? 'selected':''}>New</option>
          <option value="in_progress" ${r.status==='in_progress' ? 'selected':''}>In Progress</option>
          <option value="complete"    ${r.status==='complete'    ? 'selected':''}>Complete</option>
        </select>
      </td>
      <td>
        <input class="notes-input" id="notes-${r.id}" value="${esc(r.admin_notes || '')}"
               placeholder="Admin notes…" />
      </td>
      <td>
        <button class="btn-save" id="save-${r.id}" onclick="saveError(${r.id})">Save</button>
      </td>
    </tr>
  `).join('');
}

function statusChanged(id) {
  document.getElementById(`save-${id}`).classList.remove('saved');
  document.getElementById(`save-${id}`).textContent = 'Save';
}

async function saveError(id) {
  const status = document.querySelector(`.status-select[data-id="${id}"]`).value;
  const notes  = document.getElementById(`notes-${id}`).value;
  const btn    = document.getElementById(`save-${id}`);
  btn.disabled = true; btn.textContent = '…';
  try {
    await fetch(`/admin/errors/${id}`, {
      method:  'PATCH',
      headers: authHeaders(),
      body:    JSON.stringify({ status, admin_notes: notes }),
    });
    btn.textContent = 'Saved ✓'; btn.classList.add('saved');
  } catch {
    btn.textContent = 'Error'; btn.style.background = '#c00';
  } finally {
    btn.disabled = false;
  }
}

// ── Feedback ──────────────────────────────────────────────
function renderFeedback(feedback) {
  const tbody = document.getElementById('feedbackBody');
  if (!feedback.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No feedback yet.</td></tr>';
    return;
  }
  tbody.innerHTML = feedback.map(r => `
    <tr>
      <td>${r.id}</td>
      <td>${esc(r.name) || '—'}</td>
      <td>${esc(r.email) || '—'}</td>
      <td style="max-width:350px;white-space:pre-wrap">${esc(r.message)}</td>
      <td style="white-space:nowrap">${fmtDate(r.submitted_at)}</td>
    </tr>
  `).join('');
}

// ── Sidebar active link ───────────────────────────────────
document.querySelectorAll('.sidebar-nav a[href^="#"]').forEach(a => {
  a.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
  });
});

loadDashboard();
</script>
</body>
</html>
